<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
  <style>
    @font-face { font-family:'CustomFont'; src:url('font.ttf') format('truetype'); }
    *{ margin:0; padding:0; box-sizing:border-box; }
    body{ background:#000; color:#fff; font-family:'CustomFont',monospace; width:100vw; height:100vh; overflow:hidden; }

    #login-screen{
      width:100vw; height:100vh;
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px;
    }
    #login-screen label{ font-size:22px; letter-spacing:6px; color:#ccc; text-transform:lowercase; }
    #code-input{
      background:transparent; border:none; border-bottom:1px solid #555;
      color:#fff; font-family:'CustomFont',monospace; font-size:26px;
      padding:6px 10px; outline:none; text-align:center; width:140px;
      letter-spacing:8px; transition:border-color .3s; caret-color:#fff;
    }
    #code-input.error{ border-color:#ff3333; animation:shake .3s ease; }
    @keyframes shake{ 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }

    #game-screen{ display:none; width:100vw; height:100vh; position:relative; }
    #game-canvas{ position:absolute; top:0; left:0; image-rendering:pixelated; }
    #scanlines{ position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:10; }
    #fade-overlay{ position:absolute; top:0; left:0; width:100%; height:100%; background:#000; pointer-events:none; z-index:20; opacity:0; transition:none; }
  </style>
</head>
<body>
  <audio id="bg-audio" src="nihil.flac" loop preload="auto"></audio>

  <div id="login-screen">
    <label for="code-input">код</label>
    <input type="text" id="code-input" maxlength="4" autocomplete="off" autofocus>
  </div>

  <div id="game-screen">
    <canvas id="game-canvas"></canvas>
    <canvas id="scanlines"></canvas>
    <div id="fade-overlay"></div>
  </div>

  <script>
  /* ─────────────────────────────────────
     CONSTANTS
  ───────────────────────────────────── */
  const CODES   = { '0101':6,'2424':5,'7845':0,'3416':1,'4523':3,'3636':2,'3777':4 };
  const SPRITE_W = 32, SPRITE_H = 48, SCALE = 3, SPEED = 80, ANIM_MS = 320;

  /* ─────────────────────────────────────
     SCENE SYSTEM
  ───────────────────────────────────── */
  let scenes        = [];
  let currentSceneId = null;
  let texCache      = {};  // objId → Image

  // Transition state
  let fadePhase     = 'idle';  // 'idle' | 'out' | 'in'
  let fadeAlpha     = 0;
  let pendingScene  = null;
  let portalCooldown = 0;

  const FADE_SPEED  = 4.5;  // alpha units per second → ~220ms

  function currentScene() { return scenes.find(s => s.id === currentSceneId); }

  function preloadScene(scene) {
    for (const obj of scene.objects || []) {
      if (obj.texture && !texCache[obj.id]) {
        const img = new Image();
        img.src = obj.texture;
        texCache[obj.id] = img;
      }
    }
  }

  function activateScene(sceneId, fromPortal) {
    const scene = scenes.find(s => s.id === sceneId);
    if (!scene) return;
    currentSceneId = sceneId;
    preloadScene(scene);
    // Position player at spawn
    const sp = scene.spawnPoint || { x: 640, y: 360 };
    px = sp.x - (SPRITE_W * SCALE) / 2;
    py = sp.y - (SPRITE_H * SCALE) / 2;
    if (fromPortal) portalCooldown = 1.2;
  }

  async function loadMap() {
    try {
      const res  = await fetch('map.json?_=' + Date.now());
      if (!res.ok) throw new Error('no map');
      const data = await res.json();

      if (data.version === 2 && Array.isArray(data.scenes) && data.scenes.length) {
        scenes = data.scenes;
      } else {
        // v1 compat — wrap flat objects into single scene
        scenes = [{
          id: 1, name: 'сцена 1',
          spawnPoint: { x: 640, y: 360 },
          objects: data.objects || []
        }];
      }
    } catch {
      scenes = [{ id:1, name:'сцена 1', spawnPoint:{x:640,y:360}, objects:[] }];
    }
  }

  /* ─────────────────────────────────────
     AUDIO
  ───────────────────────────────────── */
  const audio = document.getElementById('bg-audio');
  function tryPlayAudio() { audio.play().catch(()=>{}); }
  tryPlayAudio();
  document.addEventListener('keydown',   tryPlayAudio, { once:true });
  document.addEventListener('pointerdown', tryPlayAudio, { once:true });

  /* ─────────────────────────────────────
     SPRITE
  ───────────────────────────────────── */
  const spriteSheet = new Image();
  spriteSheet.src   = 'players.png';

  /* ─────────────────────────────────────
     LOGIN
  ───────────────────────────────────── */
  const codeInput   = document.getElementById('code-input');
  const loginScreen = document.getElementById('login-screen');
  const gameScreen  = document.getElementById('game-screen');
  const canvas      = document.getElementById('game-canvas');
  const ctx         = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;

  let charIndex = 0;

  codeInput.addEventListener('keydown', function(e) {
    if (e.key !== 'Enter') return;
    const val = this.value.trim();
    if (val in CODES) { charIndex = CODES[val]; startGame(); }
    else {
      this.classList.add('error'); this.value = '';
      setTimeout(() => this.classList.remove('error'), 400);
    }
  });

  /* ─────────────────────────────────────
     SCANLINES
  ───────────────────────────────────── */
  const slCanvas  = document.getElementById('scanlines');
  const slCtx     = slCanvas.getContext('2d');
  let lineOffsets = [];
  let flickerPhase = 0;

  function buildScanlines() {
    lineOffsets = [];
    let y = 0;
    while (y < slCanvas.height) {
      lineOffsets.push({ y, alpha: 0.10 + Math.random()*0.09, h: Math.random()<0.12?2:1 });
      y += Math.random()<0.3 ? 4 : 3;
    }
  }

  function resizeScanlines() {
    slCanvas.width  = window.innerWidth;
    slCanvas.height = window.innerHeight;
    buildScanlines(); drawScanlines();
  }

  function drawScanlines() {
    slCtx.clearRect(0,0,slCanvas.width,slCanvas.height);
    const cx=slCanvas.width*.48, cy=slCanvas.height*.52;
    const r = Math.max(slCanvas.width,slCanvas.height)*.72;
    const vg = slCtx.createRadialGradient(cx,cy,r*.3,cx,cy,r);
    vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(0,0,0,0.38)');
    slCtx.fillStyle=vg; slCtx.fillRect(0,0,slCanvas.width,slCanvas.height);
    flickerPhase += 0.018;
    const shift = Math.sin(flickerPhase)*0.012 + (Math.random()<0.003 ? Math.random()*0.06 : 0);
    for (const ln of lineOffsets) {
      const extra = Math.random()<0.004 ? 0.07 : 0;
      slCtx.fillStyle = `rgba(0,0,0,${Math.max(0, ln.alpha+shift+extra)})`;
      slCtx.fillRect(0, ln.y, slCanvas.width, ln.h);
    }
  }

  window.addEventListener('resize', () => { resizeCanvas(); resizeScanlines(); });

  /* ─────────────────────────────────────
     COLLISION
  ───────────────────────────────────── */
  const HB_INSET_X = SPRITE_W * SCALE * 0.18;
  const HB_TOP_PCT = 0.55;

  function playerHitbox(x, y) {
    const dw = SPRITE_W * SCALE, dh = SPRITE_H * SCALE;
    return { x: x+HB_INSET_X, y: y+dh*HB_TOP_PCT, w: dw-HB_INSET_X*2, h: dh*(1-HB_TOP_PCT) };
  }

  function rectsOverlap(a, b) {
    return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
  }

  function resolveCollisions(nx, ny, cx, cy) {
    const scene = currentScene();
    const colliders = (scene?.objects || []).filter(o => o.type === 'collider');
    let rx = nx, ry = ny;
    for (const c of colliders) {
      if (rectsOverlap(playerHitbox(rx, cy), c)) rx = cx;
      if (rectsOverlap(playerHitbox(rx, ry), c)) ry = cy;
    }
    return { x:rx, y:ry };
  }

  /* ─────────────────────────────────────
     PORTAL CHECK
  ───────────────────────────────────── */
  function checkPortals(dt) {
    if (portalCooldown > 0) { portalCooldown -= dt; return; }
    if (fadePhase !== 'idle') return;
    const scene = currentScene();
    const portals = (scene?.objects || []).filter(o => o.type === 'portal' && o.targetSceneId);
    const hb = playerHitbox(px, py);
    for (const p of portals) {
      if (rectsOverlap(hb, p)) {
        pendingScene = p.targetSceneId;
        fadePhase = 'out'; fadeAlpha = 0;
        return;
      }
    }
  }

  /* ─────────────────────────────────────
     DRAW MAP
  ───────────────────────────────────── */
  function hexToRgba(hex, a) {
    hex = (hex||'#888888').replace('#','');
    if (hex.length===3) hex=hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
    return `rgba(${parseInt(hex.slice(0,2),16)},${parseInt(hex.slice(2,4),16)},${parseInt(hex.slice(4,6),16)},${a??1})`;
  }

  function drawLayer(behind) {
    const scene = currentScene(); if (!scene) return;
    const objs  = (scene.objects || [])
      .filter(o => o.type !== 'collider')
      .filter(o => behind ? (o.z||0) <= 0 : (o.z||0) > 0)
      .sort((a,b) => (a.z||0)-(b.z||0));

    ctx.save(); ctx.imageSmoothingEnabled = false;
    for (const obj of objs) {
      const alpha = obj.opacity ?? (obj.type==='portal' ? 0 : 0.8);
      if (alpha <= 0) continue;
      const img = texCache[obj.id];
      if (img && img.complete && img.naturalWidth > 0) {
        ctx.globalAlpha = alpha;
        ctx.drawImage(img, obj.x, obj.y, obj.w, obj.h);
      } else {
        ctx.fillStyle = hexToRgba(obj.color || (obj.type==='portal'?'#aa44ff':'#33aaff'), alpha);
        ctx.fillRect(obj.x, obj.y, obj.w, obj.h);
      }
      ctx.globalAlpha = 1;
    }
    ctx.restore();
  }

  /* ─────────────────────────────────────
     GAME STATE
  ───────────────────────────────────── */
  let px, py;
  let keys = {}, walkFrame = 0, walkTimer = 0, isMoving = false, facingLeft = false, lastTs = null;

  async function startGame() {
    tryPlayAudio();
    await loadMap();
    loginScreen.style.display = 'none';
    gameScreen.style.display  = 'block';
    resizeCanvas(); resizeScanlines();
    // Start at first scene
    if (scenes.length) activateScene(scenes[0].id, false);
    requestAnimationFrame(gameLoop);
  }

  function resizeCanvas() {
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    ctx.imageSmoothingEnabled = false;
  }

  /* ─────────────────────────────────────
     INPUT
  ───────────────────────────────────── */
  window.addEventListener('keydown', e => {
    keys[e.key] = true;
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
  });
  window.addEventListener('keyup', e => { keys[e.key] = false; });

  /* ─────────────────────────────────────
     GAME LOOP
  ───────────────────────────────────── */
  const fadeEl = document.getElementById('fade-overlay');

  function setFadeOverlay(alpha) {
    fadeEl.style.opacity = alpha;
  }

  function gameLoop(ts) {
    if (lastTs === null) lastTs = ts;
    const dt = Math.min((ts - lastTs) / 1000, 0.1);
    lastTs = ts;

    /* ── TRANSITION FADE ── */
    if (fadePhase === 'out') {
      fadeAlpha = Math.min(1, fadeAlpha + dt * FADE_SPEED);
      setFadeOverlay(fadeAlpha);
      if (fadeAlpha >= 1) {
        activateScene(pendingScene, true);
        fadePhase = 'in';
      }
    } else if (fadePhase === 'in') {
      fadeAlpha = Math.max(0, fadeAlpha - dt * FADE_SPEED);
      setFadeOverlay(fadeAlpha);
      if (fadeAlpha <= 0) { fadePhase = 'idle'; pendingScene = null; }
    }

    /* ── MOVEMENT (blocked during out-phase) ── */
    let dx = 0, dy = 0;
    if (fadePhase !== 'out') {
      if (keys['ArrowLeft']  || keys['a'] || keys['A']) { dx -= 1; facingLeft = false; }
      if (keys['ArrowRight'] || keys['d'] || keys['D']) { dx += 1; facingLeft = false; }
      if (keys['ArrowUp']    || keys['w'] || keys['W']) dy -= 1;
      if (keys['ArrowDown']  || keys['s'] || keys['S']) dy += 1;
    }

    if (dx !== 0 && dy !== 0) { dx *= 0.707; dy *= 0.707; }
    isMoving = dx !== 0 || dy !== 0;

    const rawX = px + dx * SPEED * dt;
    const rawY = py + dy * SPEED * dt;
    const maxX = canvas.width  - SPRITE_W * SCALE;
    const maxY = canvas.height - SPRITE_H * SCALE;
    const clampedX = Math.max(0, Math.min(maxX, rawX));
    const clampedY = Math.max(0, Math.min(maxY, rawY));
    const resolved = resolveCollisions(clampedX, clampedY, px, py);
    px = resolved.x; py = resolved.y;

    /* ── PORTAL CHECK ── */
    checkPortals(dt);

    /* ── ANIMATION ── */
    if (isMoving) {
      walkTimer += dt * 1000;
      if (walkTimer >= ANIM_MS) { walkTimer -= ANIM_MS; walkFrame = (walkFrame + 1) % 2; }
    } else { walkFrame = 0; walkTimer = 0; }

    /* ── DRAW ── */
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    drawLayer(true);   // bg objects (z <= 0)

    const srcX = charIndex * SPRITE_W;
    const srcY = isMoving ? (1 + walkFrame) * SPRITE_H : 0;
    const dw   = SPRITE_W * SCALE, dh = SPRITE_H * SCALE;
    ctx.save();
    if (facingLeft) {
      ctx.translate(Math.round(px) + dw, Math.round(py));
      ctx.scale(-1, 1);
      ctx.drawImage(spriteSheet, srcX, srcY, SPRITE_W, SPRITE_H, 0, 0, dw, dh);
    } else {
      ctx.drawImage(spriteSheet, srcX, srcY, SPRITE_W, SPRITE_H, Math.round(px), Math.round(py), dw, dh);
    }
    ctx.restore();

    drawLayer(false);  // fg objects (z > 0)

    drawScanlines();
    requestAnimationFrame(gameLoop);
  }
  </script>
</body>
</html>
