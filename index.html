<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
  <style>
    @font-face { font-family:'CustomFont'; src:url('font.ttf') format('truetype'); }
    *{ margin:0; padding:0; box-sizing:border-box; }
    body{ background:#000; color:#fff; font-family:'CustomFont',monospace; width:100vw; height:100vh; overflow:hidden; }

    #login-screen{
      width:100vw; height:100vh;
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px;
    }
    #login-screen label{ font-size:22px; letter-spacing:6px; color:#ccc; text-transform:lowercase; }
    #code-input{
      background:transparent; border:none; border-bottom:1px solid #555;
      color:#fff; font-family:'CustomFont',monospace; font-size:26px;
      padding:6px 10px; outline:none; text-align:center; width:140px;
      letter-spacing:8px; transition:border-color .3s; caret-color:#fff;
    }
    #code-input.error{ border-color:#ff3333; animation:shake .3s ease; }
    @keyframes shake{ 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }

    #game-screen{ display:none; width:100vw; height:100vh; position:relative; }
    #game-canvas{ position:absolute; top:0; left:0; image-rendering:pixelated; }
    #scanlines{ position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:10; }
    #fade-overlay{ position:absolute; top:0; left:0; width:100%; height:100%; background:#000; pointer-events:none; z-index:20; opacity:0; transition:none; }

    /* ── DIALOG ── */
    #dialog-box{
      position:absolute; bottom:72px; left:50%; transform:translateX(-50%);
      width:min(640px,88vw); background:rgba(0,0,0,0.92); border:1px solid #333;
      padding:20px 24px 14px; z-index:15; display:none;
    }
    #dialog-text{
      font-size:17px; letter-spacing:2px; line-height:1.7;
      min-height:2.8em; color:#e2e2e2; white-space:pre-wrap; word-break:break-word;
    }
    #dialog-cursor{
      display:inline-block; width:9px; height:17px;
      background:#ddd; margin-left:2px; vertical-align:text-bottom;
      animation:blink .55s step-end infinite;
    }
    @keyframes blink{ 50%{ opacity:0; } }
    #dialog-choices{
      display:none; margin-top:14px; flex-direction:row; gap:14px;
    }
    .d-choice{
      padding:5px 16px; border:1px solid #444;
      font-family:'CustomFont',monospace; font-size:13px;
      letter-spacing:3px; color:#666; cursor:pointer; transition:all .1s;
    }
    .d-choice.sel{ border-color:#ccc; color:#ccc; }
    .d-choice:hover{ border-color:#888; color:#aaa; }
    #dialog-continue{
      text-align:right; font-size:9px; letter-spacing:3px;
      color:#444; margin-top:10px; display:none;
    }

    /* ── INTERACT PROMPT ── */
    #interact-prompt{
      position:absolute; background:rgba(0,0,0,0.78); border:1px solid #444;
      font-size:9px; letter-spacing:2px; color:#999; padding:3px 8px;
      pointer-events:none; z-index:12; display:none;
      transform:translateX(-50%);
    }

    /* ── KEY HUD ── */
    #key-hud{
      position:absolute; top:16px; right:16px;
      z-index:12; display:flex; flex-direction:column;
      gap:4px; align-items:flex-end;
    }
    .key-hud-entry{
      font-size:10px; letter-spacing:2px; color:#ffffff;
      background:rgba(0,0,0,0.65); padding:3px 8px;
      border:1px solid rgba(255,255,255,0.22);
    }
	#hint {
	  position: fixed;
	  bottom: 18px;
	  right: 22px;
	  font-size: 12px;
	  opacity: .3;
	  pointer-events: none;
	  animation: bh 1.4s ease-in-out infinite;
	}

	@keyframes bh {
	  50% { opacity: .06; }
	}
  </style>
</head>
<body>
  <audio id="bg-audio" src="nihil.ogg" loop preload="auto"></audio>
  
  <div id="login-screen">
    <label for="code-input">код</label>
    <input type="text" id="code-input" maxlength="4" autocomplete="off" autofocus>
  </div>

  <div id="game-screen">
    <canvas id="game-canvas"></canvas>
    <canvas id="scanlines"></canvas>
    <div id="fade-overlay"></div>

    <!-- DIALOG -->
    <div id="dialog-box">
      <div id="dialog-text"></div>
      <div id="dialog-choices"></div>
      <div id="dialog-continue">[ e ]</div>
    </div>

    <!-- INTERACT PROMPT -->
    <div id="interact-prompt">[ e ]</div>

    <!-- KEY HUD -->
    <div id="key-hud"></div>
  </div>
  
  <div id="hint">:^0</div>
  
  <script>

  /* ─────────────────────────────────────
     CONSTANTS
  ───────────────────────────────────── */
  const CODES   = { '0101':6,'2424':5,'7845':0,'3416':1,'4523':3,'3636':2,'3777':4 };
  const SPRITE_W = 32, SPRITE_H = 48, SCALE = 3, SPEED = 100, ANIM_MS = 320;

  /* ─────────────────────────────────────
     SCENE SYSTEM
  ───────────────────────────────────── */
  let scenes         = [];
  let currentSceneId = null;
  let texCache       = {};  // objId → Image

  let fadePhase    = 'idle';
  let fadeAlpha    = 0;
  let pendingScene = null;
  let portalCooldown = 0;
  const FADE_SPEED = 4.5;

  function currentScene() { return scenes.find(s => s.id === currentSceneId); }

  function preloadScene(scene) {
    for (const obj of scene.objects || []) {
      if (obj.texture && !texCache[obj.id]) {
        const img = new Image(); img.src = obj.texture; texCache[obj.id] = img;
      }
    }
  }

  function activateScene(sceneId, fromPortal) {
    const scene = scenes.find(s => s.id === sceneId);
    if (!scene) return;
    currentSceneId = sceneId;
    preloadScene(scene);
    const sp = scene.spawnPoint || { x:640, y:360 };
    px = sp.x - (SPRITE_W * SCALE) / 2;
    py = sp.y - (SPRITE_H * SCALE) / 2;
    if (fromPortal) portalCooldown = 1.2;
  }

  async function loadMap() {
    try {
      const res  = await fetch('map.json?_=' + Date.now());
      if (!res.ok) throw new Error('no map');
      const data = await res.json();
      if (data.version === 2 && Array.isArray(data.scenes) && data.scenes.length) {
        scenes = data.scenes;
      } else {
        scenes = [{ id:1, name:'сцена 1', spawnPoint:{x:640,y:360}, objects: data.objects || [] }];
      }
    } catch {
      scenes = [{ id:1, name:'сцена 1', spawnPoint:{x:640,y:360}, objects:[] }];
    }
  }

  /* ─────────────────────────────────────
     AUDIO – background
  ───────────────────────────────────── */
  const bgAudio = document.getElementById('bg-audio');
  function tryPlayAudio() { bgAudio.play().catch(()=>{}); }
  tryPlayAudio();
  document.addEventListener('keydown',   tryPlayAudio, { once:true });
  document.addEventListener('pointerdown', tryPlayAudio, { once:true });

  /* ─────────────────────────────────────
     AUDIO – typing sound pool
  ───────────────────────────────────── */
  const SYM_POOL_SIZE = 6;
  const symPool = Array.from({ length: SYM_POOL_SIZE }, () => {
    const a = new Audio('sym_00.mp3');
    a.volume = 0.45;
    return a;
  });
  let symPoolIdx = 0;
  const SILENT_CHARS = new Set([' ', '\n', '\t', '.', ',', '!', '?', '…', '—', '-']);

  function playTypeSound() {
    const a = symPool[symPoolIdx++ % SYM_POOL_SIZE];
    a.currentTime = 0;
    a.play().catch(() => {});
  }

  /* ─────────────────────────────────────
     SPRITE
  ───────────────────────────────────── */
  const spriteSheet = new Image();
  spriteSheet.src   = 'players.png';

  /* ─────────────────────────────────────
     INVENTORY
  ───────────────────────────────────── */
  const inventory = {};  // keyTag → count

  /* ─────────────────────────────────────
     DIALOG SYSTEM
  ───────────────────────────────────── */
  const dlgBox      = document.getElementById('dialog-box');
  const dlgText     = document.getElementById('dialog-text');
  const dlgChoices  = document.getElementById('dialog-choices');
  const dlgContinue = document.getElementById('dialog-continue');
  const iPrompt     = document.getElementById('interact-prompt');
  const keyHud      = document.getElementById('key-hud');

  let dlg = null;
  let dlgLocked = false;
  // null | { text, shown, charIdx, charTimer, done, choices, choiceIdx, onClose }
  const CHAR_DELAY = 0.038;  // seconds per char

  function openTextDialog(text, onClose) {
    dlg = { text: text||'', shown:'', charIdx:0, charTimer:0, done:false,
            choices:null, choiceIdx:0, onClose: onClose||null };
    _dlgShowBox();
  }

  function openChoiceDialog(text, choices, onClose) {
    dlg = { text: text||'', shown:'', charIdx:0, charTimer:0, done:false,
            choices, choiceIdx:0, onClose: onClose||null };
    _dlgShowBox();
  }

  function _dlgShowBox() {
    dlgBox.style.display  = 'block';
    dlgChoices.style.display  = 'none';
    dlgContinue.style.display = 'none';
    dlgText.textContent = '';
    iPrompt.style.display = 'none';
  }

  function _renderChoices() {
    dlgChoices.innerHTML = '';
    dlg.choices.forEach((c, i) => {
      const div = document.createElement('div');
      div.className = 'd-choice' + (i === dlg.choiceIdx ? ' sel' : '');
      div.textContent = c.label;
      div.addEventListener('click', () => { dlg.choiceIdx = i; _confirmChoice(); });
      dlgChoices.appendChild(div);
    });
    dlgChoices.style.display = 'flex';
    dlgContinue.style.display = 'none';
  }

  function _confirmChoice() {
    if (!dlg || !dlg.choices) return;
    const action = dlg.choices[dlg.choiceIdx].action;
    closeDialog();
    if (action) action();
  }

  function closeDialog() {
    if (dlgLocked) return;
    if (dlg?.onClose) dlg.onClose();
    dlg = null;
    dlgBox.style.display = 'none';
    updateKeyHUD();
  }

  function _skipTyping() {
    if (!dlg) return;
    dlg.shown   = dlg.text;
    dlg.charIdx = dlg.text.length;
    dlg.done    = true;
    dlgText.textContent = dlg.shown;
    if (dlg.choices) { _renderChoices(); }
    else { dlgContinue.style.display = 'block'; }
  }

  function dialogUpdate(dt) {
    if (!dlg || dlg.done) return;
    dlg.charTimer += dt;
    while (dlg.charTimer >= CHAR_DELAY && dlg.charIdx < dlg.text.length) {
      dlg.charTimer -= CHAR_DELAY;
      const ch = dlg.text[dlg.charIdx++];
      dlg.shown += ch;
      if (!SILENT_CHARS.has(ch)) playTypeSound();
    }
    // Update DOM text + cursor
    dlgText.textContent = dlg.shown;
    if (dlg.charIdx < dlg.text.length) {
      const cur = document.createElement('span');
      cur.id = 'dialog-cursor';
      dlgText.appendChild(cur);
    } else {
      dlg.done = true;
      if (dlg.choices) { _renderChoices(); }
      else { dlgContinue.style.display = 'block'; }
    }
  }

  function handleDialogKey(key) {
    if (!dlg) return false;
    if (!dlg.done) {
      if (key === 'e' || key === 'E' || key === 'Enter' || key === ' ') _skipTyping();
      return true;
    }
    if (dlg.choices) {
      if (key === 'ArrowLeft'  || key === 'a' || key === 'A') { dlg.choiceIdx = Math.max(0, dlg.choiceIdx-1); _renderChoices(); }
      else if (key === 'ArrowRight' || key === 'd' || key === 'D') { dlg.choiceIdx = Math.min(dlg.choices.length-1, dlg.choiceIdx+1); _renderChoices(); }
      else if (key === 'e' || key === 'E' || key === 'Enter') _confirmChoice();
    } else {
      if (key === 'e' || key === 'E' || key === 'Enter' || key === ' ') closeDialog();
    }
    return true;
  }

  /* ─────────────────────────────────────
     INTERACTION SYSTEM
  ───────────────────────────────────── */
  const INTERACT_EXTRA = 20;  // extra px range beyond hitbox
  const INTERACT_TYPES = new Set(['interaction', 'key', 'lock', 'lock_jumpscare']);

  function findNearInteractable() {
    const scene = currentScene(); if (!scene) return null;
    const hb = playerHitbox(px, py);
    const range = {
      x: hb.x - INTERACT_EXTRA, y: hb.y - INTERACT_EXTRA,
      w: hb.w + INTERACT_EXTRA*2, h: hb.h + INTERACT_EXTRA*2
    };
    for (const obj of scene.objects || []) {
      if (INTERACT_TYPES.has(obj.type) && rectsOverlap(range, obj)) return obj;
    }
    return null;
  }

  function triggerInteraction() {
    if (dlg) return;
    const obj = findNearInteractable();
    if (!obj) return;

    if (obj.type === 'interaction') {
      openTextDialog(obj.dialogText || '...');

    } else if (obj.type === 'key') {
      openChoiceDialog(obj.pickupText || 'Подобрать?', [
        { label: 'Да', action: () => {
          const tag = obj.keyTag || 'ключ';
          inventory[tag] = (inventory[tag] || 0) + 1;
          const sc = currentScene();
          if (sc) sc.objects = sc.objects.filter(o => o.id !== obj.id);
          updateKeyHUD();
        }},
        { label: 'Нет', action: () => {} }
      ]);

    } else if (obj.type === 'lock') {
      const tag  = obj.requiredKeyTag || 'ключ';
      const need = Math.max(1, obj.requiredCount || 1);
      const isScreamer = obj.lockType === 'screamer';
      if ((inventory[tag] || 0) >= need) {
        inventory[tag] -= need;
        updateKeyHUD();
        const sc = currentScene();
        if (isScreamer) {
          if (sc) sc.objects = sc.objects.filter(o => o.id !== obj.id);
          openTextDialog(obj.unlockText || 'Открыто!');
          dlgLocked = true;
          runJumpscareSequence();
        } else {
          openTextDialog(obj.unlockText || 'Открыто!', () => {
            if (sc) sc.objects = sc.objects.filter(o => o.id !== obj.id);
          });
        }
      } else {
        openTextDialog(obj.lockedText || 'Заперто.');
      }

    } else if (obj.type === 'lock_jumpscare') {
      const tag  = obj.requiredKeyTag || 'ключ';
      const need = Math.max(1, obj.requiredCount || 1);
      if ((inventory[tag] || 0) >= need) {
        inventory[tag] -= need;
        updateKeyHUD();
        const sc = currentScene();
        if (sc) sc.objects = sc.objects.filter(o => o.id !== obj.id);
        openTextDialog(obj.unlockText || 'Открыто!');
        dlgLocked = true;
        runJumpscareSequence();
      } else {
        openTextDialog(obj.lockedText || 'Заперто.');
      }
    }
  }

  function updateInteractPrompt() {
    if (dlg) { iPrompt.style.display = 'none'; return; }
    const obj = findNearInteractable();
    if (obj) {
      const cx = Math.round(px + SPRITE_W * SCALE / 2);
      const cy = Math.round(py);
      iPrompt.style.left = cx + 'px';
      iPrompt.style.top  = (cy - 26) + 'px';
      iPrompt.style.display = 'block';
    } else {
      iPrompt.style.display = 'none';
    }
  }

  /* ─────────────────────────────────────
     KEY HUD
  ───────────────────────────────────── */
  function updateKeyHUD() {
    keyHud.innerHTML = '';
    for (const [tag, count] of Object.entries(inventory)) {
      if ((count || 0) <= 0) continue;
      const div = document.createElement('div');
      div.className = 'key-hud-entry';
      div.textContent = tag + ' × ' + count;
      keyHud.appendChild(div);
    }
  }

  /* ─────────────────────────────────────
     LOGIN
  ───────────────────────────────────── */
  const codeInput   = document.getElementById('code-input');
  const loginScreen = document.getElementById('login-screen');
  const gameScreen  = document.getElementById('game-screen');
  const canvas      = document.getElementById('game-canvas');
  const ctx         = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;

  let charIndex = 0;

  codeInput.addEventListener('keydown', function(e) {
    if (e.key !== 'Enter') return;
    const val = this.value.trim();
    if (val in CODES) { charIndex = CODES[val]; startGame(); }
    else {
      this.classList.add('error'); this.value = '';
      setTimeout(() => this.classList.remove('error'), 400);
    }
  });

  /* ─────────────────────────────────────
     SCANLINES
  ───────────────────────────────────── */
  const slCanvas  = document.getElementById('scanlines');
  const slCtx     = slCanvas.getContext('2d');
  let lineOffsets = [];
  let flickerPhase = 0;

  function buildScanlines() {
    lineOffsets = [];
    let y = 0;
    while (y < slCanvas.height) {
      lineOffsets.push({ y, alpha: 0.10 + Math.random()*0.09, h: Math.random()<0.12?2:1 });
      y += Math.random()<0.3 ? 4 : 3;
    }
  }

  function resizeScanlines() {
    slCanvas.width  = window.innerWidth;
    slCanvas.height = window.innerHeight;
    buildScanlines(); drawScanlines();
  }

  function drawScanlines() {
    slCtx.clearRect(0,0,slCanvas.width,slCanvas.height);
    const cx=slCanvas.width*.48, cy=slCanvas.height*.52;
    const r = Math.max(slCanvas.width,slCanvas.height)*.72;
    const vg = slCtx.createRadialGradient(cx,cy,r*.3,cx,cy,r);
    vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(0,0,0,0.38)');
    slCtx.fillStyle=vg; slCtx.fillRect(0,0,slCanvas.width,slCanvas.height);
    flickerPhase += 0.018;
    const shift = Math.sin(flickerPhase)*0.012 + (Math.random()<0.003 ? Math.random()*0.06 : 0);
    for (const ln of lineOffsets) {
      const extra = Math.random()<0.004 ? 0.07 : 0;
      slCtx.fillStyle = `rgba(0,0,0,${Math.max(0, ln.alpha+shift+extra)})`;
      slCtx.fillRect(0, ln.y, slCanvas.width, ln.h);
    }
  }

  window.addEventListener('resize', () => { resizeCanvas(); resizeScanlines(); });

  /* ─────────────────────────────────────
     COLLISION
  ───────────────────────────────────── */
  const HB_INSET_X = SPRITE_W * SCALE * 0.18;
  const HB_TOP_PCT = 0.55;

  function playerHitbox(x, y) {
    const dw = SPRITE_W * SCALE, dh = SPRITE_H * SCALE;
    return { x: x+HB_INSET_X, y: y+dh*HB_TOP_PCT, w: dw-HB_INSET_X*2, h: dh*(1-HB_TOP_PCT) };
  }

  function rectsOverlap(a, b) {
    return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
  }

  function resolveCollisions(nx, ny, cx, cy) {
    const scene = currentScene();
    const colliders = (scene?.objects || []).filter(o => o.type === 'collider' || o.type === 'lock' || o.type === 'lock_jumpscare');
    let rx = nx, ry = ny;
    for (const c of colliders) {
      if (rectsOverlap(playerHitbox(rx, cy), c)) rx = cx;
      if (rectsOverlap(playerHitbox(rx, ry), c)) ry = cy;
    }
    return { x:rx, y:ry };
  }

  /* ─────────────────────────────────────
     PORTAL CHECK
  ───────────────────────────────────── */
  function checkPortals(dt) {
    if (portalCooldown > 0) { portalCooldown -= dt; return; }
    if (fadePhase !== 'idle') return;
    const scene = currentScene();
    const portals = (scene?.objects || []).filter(o => o.type === 'portal' && o.targetSceneId);
    const hb = playerHitbox(px, py);
    for (const p of portals) {
      if (rectsOverlap(hb, p)) {
        pendingScene = p.targetSceneId;
        fadePhase = 'out'; fadeAlpha = 0;
        return;
      }
    }
  }

  /* ─────────────────────────────────────
     DRAW MAP
  ───────────────────────────────────── */
  const TYPE_COLORS = {
    portal:      '#aa44ff',
    interaction: '#ffaa00',
    key:         '#00ff88',
    lock:        '#ff6600',
    lock_jumpscare: '#ff6600'
  };

  function hexToRgba(hex, a) {
    hex = (hex||'#888888').replace('#','');
    if (hex.length===3) hex=hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
    return `rgba(${parseInt(hex.slice(0,2),16)},${parseInt(hex.slice(2,4),16)},${parseInt(hex.slice(4,6),16)},${a??1})`;
  }

  function drawLayer(behind) {
    const scene = currentScene(); if (!scene) return;
    const objs  = (scene.objects || [])
      .filter(o => o.type !== 'collider')
      .filter(o => behind ? (o.z||0) <= 0 : (o.z||0) > 0)
      .sort((a,b) => (a.z||0)-(b.z||0));

    ctx.save(); ctx.imageSmoothingEnabled = false;
    for (const obj of objs) {
      const alpha = obj.opacity ?? (obj.type==='portal' ? 0 : 0.8);
      if (alpha <= 0) continue;
      const img = texCache[obj.id];
      if (img && img.complete && img.naturalWidth > 0) {
        ctx.globalAlpha = alpha;
        ctx.drawImage(img, obj.x, obj.y, obj.w, obj.h);
      } else {
        ctx.fillStyle = hexToRgba(obj.color || TYPE_COLORS[obj.type] || '#33aaff', alpha);
        ctx.fillRect(obj.x, obj.y, obj.w, obj.h);
      }
      ctx.globalAlpha = 1;
    }
    ctx.restore();
  }

  /* ─────────────────────────────────────
     GAME STATE
  ───────────────────────────────────── */
  let px, py;
  let keys = {}, walkFrame = 0, walkTimer = 0, isMoving = false, facingLeft = false, lastTs = null;

  async function startGame() {
    tryPlayAudio();
    await loadMap();
    loginScreen.style.display = 'none';
    gameScreen.style.display  = 'block';
    resizeCanvas(); resizeScanlines();
    if (scenes.length) activateScene(scenes[0].id, false);
    requestAnimationFrame(gameLoop);
  }

  function resizeCanvas() {
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    ctx.imageSmoothingEnabled = false;
  }

  /* ─────────────────────────────────────
     INPUT
  ───────────────────────────────────── */
  window.addEventListener('keydown', e => {
    // Dialog consumes input first
    if (dlg) {
      handleDialogKey(e.key);
      e.preventDefault();
      return;
    }

    // E = interact
    if (e.key === 'e' || e.key === 'E') {
      triggerInteraction();
      return;
    }

    keys[e.key] = true;
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
  });
  window.addEventListener('keyup', e => { keys[e.key] = false; });

  /* ─────────────────────────────────────
     GAME LOOP
  ───────────────────────────────────── */
  const fadeEl = document.getElementById('fade-overlay');
  function setFadeOverlay(alpha) { fadeEl.style.opacity = alpha; }

  function gameLoop(ts) {
    if (lastTs === null) lastTs = ts;
    const dt = Math.min((ts - lastTs) / 1000, 0.1);
    lastTs = ts;

    /* ── DIALOG UPDATE ── */
    dialogUpdate(dt);

    /* ── TRANSITION FADE ── */
    if (fadePhase === 'out') {
      fadeAlpha = Math.min(1, fadeAlpha + dt * FADE_SPEED);
      setFadeOverlay(fadeAlpha);
      if (fadeAlpha >= 1) { activateScene(pendingScene, true); fadePhase = 'in'; }
    } else if (fadePhase === 'in') {
      fadeAlpha = Math.max(0, fadeAlpha - dt * FADE_SPEED);
      setFadeOverlay(fadeAlpha);
      if (fadeAlpha <= 0) { fadePhase = 'idle'; pendingScene = null; }
    }

    /* ── MOVEMENT (blocked during dialog or out-fade) ── */
    let dx = 0, dy = 0;
    if (fadePhase !== 'out' && !dlg) {
      if (keys['ArrowLeft']  || keys['a'] || keys['A']) { dx -= 1; facingLeft = false; }
      if (keys['ArrowRight'] || keys['d'] || keys['D']) { dx += 1; facingLeft = false; }
      if (keys['ArrowUp']    || keys['w'] || keys['W']) dy -= 1;
      if (keys['ArrowDown']  || keys['s'] || keys['S']) dy += 1;
    }

    if (dx !== 0 && dy !== 0) { dx *= 0.707; dy *= 0.707; }
    isMoving = dx !== 0 || dy !== 0;

    const rawX = px + dx * SPEED * dt;
    const rawY = py + dy * SPEED * dt;
    const maxX = canvas.width  - SPRITE_W * SCALE;
    const maxY = canvas.height - SPRITE_H * SCALE;
    const clampedX = Math.max(0, Math.min(maxX, rawX));
    const clampedY = Math.max(0, Math.min(maxY, rawY));
    const resolved = resolveCollisions(clampedX, clampedY, px, py);
    px = resolved.x; py = resolved.y;

    /* ── PORTAL CHECK (blocked during dialog) ── */
    if (!dlg) checkPortals(dt);

    /* ── INTERACT PROMPT ── */
    updateInteractPrompt();

    /* ── ANIMATION ── */
    if (isMoving) {
      walkTimer += dt * 1000;
      if (walkTimer >= ANIM_MS) { walkTimer -= ANIM_MS; walkFrame = (walkFrame + 1) % 2; }
    } else { walkFrame = 0; walkTimer = 0; }

    /* ── DRAW ── */
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawLayer(true);

    const srcX = charIndex * SPRITE_W;
    const srcY = isMoving ? (1 + walkFrame) * SPRITE_H : 0;
    const dw   = SPRITE_W * SCALE, dh = SPRITE_H * SCALE;
    ctx.save();
    if (facingLeft) {
      ctx.translate(Math.round(px) + dw, Math.round(py));
      ctx.scale(-1, 1);
      ctx.drawImage(spriteSheet, srcX, srcY, SPRITE_W, SPRITE_H, 0, 0, dw, dh);
    } else {
      ctx.drawImage(spriteSheet, srcX, srcY, SPRITE_W, SPRITE_H, Math.round(px), Math.round(py), dw, dh);
    }
    ctx.restore();

    drawLayer(false);
    drawScanlines();
    requestAnimationFrame(gameLoop);
  }
  /* ─────────────────────────────────────
     JUMPSCARE SEQUENCE
  ───────────────────────────────────── */
  let _stopGlitch = null;

  function _startGlitchSound() {
    let active = true;
    let nodes = [];
    function fire() {
      if (!active) return;
      const a = new Audio('bsod_sound.mp3');
      a.volume = 1.0;
      a.play().catch(() => {});
      nodes.push(a);
      // rapid re-fire: 20-70ms — creates that stuttering corrupt-error feel
      setTimeout(fire, 20 + Math.random() * 50);
    }
    fire();
    return function stop() {
      active = false;
      nodes.forEach(n => { try { n.pause(); n.currentTime = 0; } catch(_){} });
      nodes = [];
    };
  }

  function _setScreen(color, opacity) {
    fadeEl.style.background = color;
    setFadeOverlay(opacity);
  }

  function runJumpscareSequence() {
    // ensure overlay starts transparent (game still visible + dialog on top)
    _setScreen('#000', 0);

    setTimeout(() => {
      // ── черный 2с ──
      _setScreen('#000', 1);

      setTimeout(() => {
        // ── белый 0.5с + глитч-звук ──
        _setScreen('#fff', 1);
        _stopGlitch = _startGlitchSound();

        setTimeout(() => {
          // ── черный 2с + тишина ──
          _setScreen('#000', 1);
          if (_stopGlitch) { _stopGlitch(); _stopGlitch = null; }

          setTimeout(() => {
            // ── белый + звук (0.5с) ──
            _setScreen('#fff', 1);
            _stopGlitch = _startGlitchSound();

            setTimeout(() => {
              // ── черный 4с + тишина ──
              _setScreen('#000', 1);
              if (_stopGlitch) { _stopGlitch(); _stopGlitch = null; }

              setTimeout(() => {
                // ── СКРИМЕР: fullscreen snake.png, без звуков ──
                _setScreen('#000', 0);
                const scare = document.createElement('img');
                scare.src = 'snake.png';
                scare.style.cssText = [
                  'position:fixed', 'top:0', 'left:0',
                  'width:100vw', 'height:100vh',
                  'object-fit:cover', 'z-index:9999',
                  'pointer-events:none'
                ].join(';');
                document.body.appendChild(scare);
                _stopGlitch = _startGlitchSound();
                // закрываем диалог
                dlgLocked = false;
                dlg = null;
                dlgBox.style.display = 'none';
              }, 4000);

            }, 500);   // длительность второго белого
          }, 2000);    // черный 2с

        }, 500);       // первый белый 0.5с
      }, 2000);        // черный 2с

    }, 6000);          // ждём 6с после открытия
  }

  </script>
