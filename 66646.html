<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>map editor / 66646</title>
  <style>
    @font-face { font-family:'CustomFont'; src:url('font.ttf') format('truetype'); }
    *{ margin:0; padding:0; box-sizing:border-box; }

    :root{
      --bg:#0a0a0a; --panel:#111; --border:#222; --accent:#c8ff00;
      --red:#ff3333; --blue:#33aaff; --purple:#aa44ff; --green:#00ff88;
      --dim:#444; --text:#ccc; --text-dim:#555; --font:'CustomFont',monospace;
    }

    body{ background:var(--bg); color:var(--text); font-family:var(--font); width:100vw; height:100vh; overflow:hidden; display:flex; }

    /* ── TOOLBAR ── */
    #toolbar{
      width:52px; height:100vh; background:var(--panel); border-right:1px solid var(--border);
      display:flex; flex-direction:column; align-items:center; padding:10px 0; gap:4px; z-index:20; flex-shrink:0;
    }
    .tool-btn{
      width:36px; height:36px; background:transparent; border:1px solid var(--border); color:var(--text-dim);
      cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .1s; position:relative;
    }
    .tool-btn:hover{ border-color:var(--dim); color:var(--text); }
    .tool-btn.active{ border-color:var(--accent); color:var(--accent); background:rgba(200,255,0,.05); }
    .tool-sep{ width:24px; height:1px; background:var(--border); margin:4px 0; }
    .tool-btn[title]:hover::after{
      content:attr(title); position:absolute; left:44px; top:50%; transform:translateY(-50%);
      background:#1a1a1a; border:1px solid var(--border); color:var(--text);
      font-size:10px; padding:3px 7px; white-space:nowrap; pointer-events:none; z-index:100; letter-spacing:2px;
    }

    /* ── CANVAS ── */
    #canvas-wrap{ flex:1; position:relative; overflow:hidden; background:#050505; }
    #main-canvas{ position:absolute; top:0; left:0; image-rendering:pixelated; cursor:crosshair; }

    /* ── RIGHT PANEL ── */
    #right-panel{
      width:230px; height:100vh; background:var(--panel); border-left:1px solid var(--border);
      display:flex; flex-direction:column; flex-shrink:0; z-index:20; overflow:hidden;
    }

    .panel-section{ border-bottom:1px solid var(--border); padding:10px 12px; }
    .panel-title{ font-size:9px; letter-spacing:4px; color:var(--text-dim); text-transform:uppercase; margin-bottom:8px; }

    .prop-row{ display:flex; align-items:center; gap:6px; margin-bottom:6px; }
    .prop-label{ font-size:9px; letter-spacing:2px; color:var(--text-dim); white-space:nowrap; flex-shrink:0; }
    .prop-input{
      background:var(--bg); border:1px solid var(--border); color:var(--text);
      font-family:var(--font); font-size:11px; padding:3px 5px; width:100%;
      outline:none; letter-spacing:1px; transition:border-color .15s;
    }
    .prop-input:focus{ border-color:var(--accent); }
    .prop-input[type=color]{ padding:1px 2px; width:34px; height:22px; cursor:pointer; flex-shrink:0; }
    .prop-grid2{ display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-bottom:6px; }
    .prop-grid2 .prop-row{ margin:0; }

    /* scene list */
    .scene-item{
      display:flex; align-items:center; gap:5px; padding:5px 12px;
      cursor:pointer; border-bottom:1px solid #141414; font-size:10px; letter-spacing:1px;
      transition:background .1s; user-select:none;
    }
    .scene-item:hover{ background:#161616; }
    .scene-item.active{ background:rgba(200,255,0,.07); }
    .scene-dot{ width:6px; height:6px; background:var(--text-dim); flex-shrink:0; }
    .scene-item.active .scene-dot{ background:var(--accent); }
    .scene-name{ flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .scene-item.active .scene-name{ color:var(--accent); }
    .scene-btn{
      background:none; border:none; font-family:var(--font); font-size:10px;
      cursor:pointer; color:var(--text-dim); opacity:0; transition:opacity .1s; padding:0 2px;
    }
    .scene-item:hover .scene-btn{ opacity:1; }
    .scene-btn:hover{ color:var(--text); }
    .scene-btn.del:hover{ color:var(--red); }

    /* tex preview */
    #tex-preview-wrap{
      width:100%; height:72px; background:#0d0d0d; border:1px solid var(--border);
      display:flex; align-items:center; justify-content:center; overflow:hidden;
      position:relative; margin-bottom:6px; image-rendering:pixelated;
    }
    #tex-preview{ max-width:100%; max-height:100%; image-rendering:pixelated; display:none; }
    #tex-none-label{ font-size:9px; letter-spacing:2px; color:var(--text-dim); }
    #tex-remove{
      position:absolute; top:3px; right:3px; background:rgba(0,0,0,.8);
      border:1px solid var(--red); color:var(--red); font-family:var(--font);
      font-size:8px; letter-spacing:1px; padding:2px 5px; cursor:pointer; display:none;
    }
    #tex-remove:hover{ background:var(--red); color:#000; }

    /* layer list */
    #layer-list{ flex:1; overflow-y:auto; scrollbar-width:thin; scrollbar-color:var(--border) transparent; }
    .layer-item{
      display:flex; align-items:center; gap:5px; padding:5px 10px;
      cursor:pointer; border-bottom:1px solid #141414; font-size:10px; letter-spacing:1px; transition:background .1s;
    }
    .layer-item:hover{ background:#161616; }
    .layer-item.selected{ background:rgba(200,255,0,.06); color:var(--accent); }
    .layer-dot{ width:8px; height:8px; flex-shrink:0; }
    .layer-name{ flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .layer-del{ color:var(--red); cursor:pointer; font-size:11px; opacity:0; transition:opacity .1s; background:none; border:none; font-family:var(--font); }
    .layer-item:hover .layer-del{ opacity:1; }

    .type-tag{ font-size:8px; letter-spacing:2px; padding:1px 4px; border:1px solid; flex-shrink:0; }
    .type-tag.collider{ border-color:var(--red);    color:var(--red);    }
    .type-tag.portal  { border-color:var(--purple); color:var(--purple); }
    .type-tag.object  { border-color:var(--blue);   color:var(--blue);   }

    .act-btn{
      width:100%; padding:7px 0; background:transparent; border:1px solid var(--border);
      color:var(--text-dim); font-family:var(--font); font-size:9px; letter-spacing:3px;
      cursor:pointer; transition:all .15s; text-transform:lowercase; margin-bottom:5px;
    }
    .act-btn:hover{ border-color:var(--accent); color:var(--accent); }
    .act-btn.danger:hover{ border-color:var(--red); color:var(--red); }
    .act-btn.primary{ border-color:var(--accent); color:var(--accent); }
    .act-btn:last-child{ margin-bottom:0; }

    .toggle-row{ display:flex; align-items:center; gap:8px; margin-bottom:7px; }
    .toggle{ width:28px; height:14px; background:var(--border); position:relative; cursor:pointer; transition:background .2s; flex-shrink:0; }
    .toggle.on{ background:var(--accent); }
    .toggle::after{ content:''; position:absolute; width:10px; height:10px; background:#000; top:2px; left:2px; transition:left .2s; }
    .toggle.on::after{ left:16px; }
    .toggle-label{ font-size:9px; letter-spacing:2px; }

    #bottom-bar{
      height:28px; background:var(--panel); border-top:1px solid var(--border);
      display:flex; align-items:center; padding:0 12px; gap:16px;
      font-size:9px; letter-spacing:2px; color:var(--text-dim);
      position:absolute; bottom:0; left:52px; right:230px; z-index:20;
    }
    #bottom-bar span{ color:var(--text); }
    #hint{
      position:absolute; bottom:34px; left:50%; transform:translateX(-50%);
      font-size:9px; letter-spacing:2px; color:var(--text-dim); pointer-events:none; z-index:30; transition:opacity 1s;
    }
    #save-flash{
      position:absolute; top:14px; left:50%; transform:translateX(-50%);
      background:rgba(200,255,0,.1); border:1px solid var(--accent);
      color:var(--accent); font-size:10px; letter-spacing:3px;
      padding:6px 16px; pointer-events:none; z-index:50; opacity:0; transition:opacity .3s;
    }

    /* scene add btn inline */
    #scene-header{ display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
    #btn-add-scene{
      background:none; border:1px solid var(--border); color:var(--text-dim);
      font-family:var(--font); font-size:14px; width:20px; height:20px;
      cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .1s; line-height:1;
    }
    #btn-add-scene:hover{ border-color:var(--accent); color:var(--accent); }
  </style>
</head>
<body>

<!-- TOOLBAR -->
<div id="toolbar">
  <button class="tool-btn active" id="btn-select"   title="выбор [V]">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 2l10 6-5 1-3 5z" stroke="currentColor" stroke-width="1.2"/></svg>
  </button>
  <button class="tool-btn" id="btn-collider" title="коллайдер [C]">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="2" y="2" width="12" height="12" stroke="currentColor" stroke-width="1.2" stroke-dasharray="3 2"/></svg>
  </button>
  <button class="tool-btn" id="btn-portal"   title="портал [P]">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
      <rect x="2" y="4" width="12" height="8" rx="1" stroke="currentColor" stroke-width="1.2" stroke-dasharray="2 2"/>
      <path d="M7 8h4M9 6l2 2-2 2" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>
    </svg>
  </button>
  <button class="tool-btn" id="btn-object"   title="объект [O]">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
      <rect x="3" y="3" width="10" height="10" stroke="currentColor" stroke-width="1.2"/>
      <line x1="8" y1="3" x2="8" y2="13" stroke="currentColor" stroke-width=".8"/>
      <line x1="3" y1="8" x2="13" y2="8" stroke="currentColor" stroke-width=".8"/>
    </svg>
  </button>
  <button class="tool-btn" id="btn-spawn"    title="точка спавна [S]">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
      <path d="M8 2L9.8 6.2L14 7L10.7 10.2L11.6 14.5L8 12.5L4.4 14.5L5.3 10.2L2 7L6.2 6.2Z" stroke="currentColor" stroke-width="1.1" fill="none"/>
    </svg>
  </button>
  <div class="tool-sep"></div>
  <button class="tool-btn" id="btn-move"     title="рука [H]">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 2v7M6 2c0-1 1.5-1 1.5 0v5M7.5 7V3c0-1 1.5-1 1.5 0v4M9 7V4c0-1 1.5-1 1.5 0v5M4.5 8V5c0-1-1.5-1-1.5 0v4c0 3 4 5 6 3" stroke="currentColor" stroke-width="1.1"/></svg>
  </button>
  <div class="tool-sep"></div>
  <button class="tool-btn" id="btn-undo"     title="отменить [Ctrl+Z]">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 8a5 5 0 1 0 1.5-3.5L2 3" stroke="currentColor" stroke-width="1.2"/><polyline points="2,1 2,4 5,4" stroke="currentColor" stroke-width="1.2"/></svg>
  </button>
  <button class="tool-btn" id="btn-redo"     title="повторить [Ctrl+Y]">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M13 8a5 5 0 1 1-1.5-3.5L14 3" stroke="currentColor" stroke-width="1.2"/><polyline points="14,1 14,4 11,4" stroke="currentColor" stroke-width="1.2"/></svg>
  </button>
  <div class="tool-sep"></div>
  <button class="tool-btn" id="btn-zoom-in"  title="приблизить [+]">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.2"/><line x1="6" y1="4" x2="6" y2="8" stroke="currentColor" stroke-width="1.2"/><line x1="4" y1="6" x2="8" y2="6" stroke="currentColor" stroke-width="1.2"/><line x1="9.2" y1="9.2" x2="12" y2="12" stroke="currentColor" stroke-width="1.2"/></svg>
  </button>
  <button class="tool-btn" id="btn-zoom-out" title="отдалить [-]">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.2"/><line x1="4" y1="6" x2="8" y2="6" stroke="currentColor" stroke-width="1.2"/><line x1="9.2" y1="9.2" x2="12" y2="12" stroke="currentColor" stroke-width="1.2"/></svg>
  </button>
  <button class="tool-btn" id="btn-zoom-fit" title="вписать [F]">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><polyline points="1,4 1,1 4,1" stroke="currentColor" stroke-width="1.2"/><polyline points="10,1 13,1 13,4" stroke="currentColor" stroke-width="1.2"/><polyline points="1,10 1,13 4,13" stroke="currentColor" stroke-width="1.2"/><polyline points="10,13 13,13 13,10" stroke="currentColor" stroke-width="1.2"/></svg>
  </button>
</div>

<!-- CANVAS -->
<div id="canvas-wrap">
  <canvas id="main-canvas"></canvas>
  <div id="bottom-bar">
    <span id="pos-display">x:0 y:0</span>
    <span id="zoom-display">100%</span>
    <span id="count-display">0 объектов</span>
  </div>
  <div id="hint">v·c·p·o·s·h — инструменты · del — удалить · ctrl+s — сохранить</div>
  <div id="save-flash">map.json сохранён</div>
</div>

<!-- RIGHT PANEL -->
<div id="right-panel">

  <!-- SCENES -->
  <div class="panel-section">
    <div id="scene-header">
      <span class="panel-title" style="margin:0">сцены</span>
      <button id="btn-add-scene" title="новая сцена">+</button>
    </div>
    <div id="scene-list"></div>
  </div>

  <!-- PROPERTIES -->
  <div class="panel-section" style="overflow-y:auto; max-height:46vh; flex-shrink:0;">
    <div class="panel-title">свойства</div>
    <div id="props-empty" style="font-size:10px;color:var(--text-dim);letter-spacing:2px;">ничего не выбрано</div>
    <div id="props-form" style="display:none">

      <div class="prop-row">
        <span class="prop-label">имя</span>
        <input class="prop-input" id="p-name" type="text">
      </div>
      <div class="prop-grid2">
        <div class="prop-row"><span class="prop-label">x</span><input class="prop-input" id="p-x" type="number"></div>
        <div class="prop-row"><span class="prop-label">y</span><input class="prop-input" id="p-y" type="number"></div>
      </div>
      <div class="prop-grid2">
        <div class="prop-row"><span class="prop-label">w</span><input class="prop-input" id="p-w" type="number"></div>
        <div class="prop-row"><span class="prop-label">h</span><input class="prop-input" id="p-h" type="number"></div>
      </div>
      <div class="prop-row">
        <span class="prop-label">цвет</span>
        <input class="prop-input" id="p-color" type="color">
        <input class="prop-input" id="p-opacity" type="number" min="0" max="1" step="0.05" style="width:58px;" placeholder="α">
      </div>
      <div class="prop-row">
        <span class="prop-label">z</span>
        <input class="prop-input" id="p-z" type="number" style="width:56px;">
        <span style="font-size:8px;letter-spacing:1px;color:var(--text-dim)">≤0 фон · >0 перед</span>
      </div>

      <!-- Portal target -->
      <div id="portal-section" style="display:none; margin-top:6px;">
        <div class="panel-title" style="margin-bottom:6px;">переход в сцену</div>
        <select class="prop-input" id="p-target-scene" style="cursor:pointer;"></select>
      </div>

      <!-- Texture (object only) -->
      <div id="tex-section" style="display:none; margin-top:8px;">
        <div class="panel-title" style="margin-bottom:6px;">текстура</div>
        <div id="tex-preview-wrap">
          <span id="tex-none-label">нет текстуры</span>
          <img id="tex-preview" alt="">
          <button id="tex-remove">✕ убрать</button>
        </div>
        <button class="act-btn" id="btn-tex-upload">загрузить png / jpg</button>
        <input type="file" id="tex-file" accept="image/*" style="display:none">

      <button class="act-btn danger" id="btn-delete-sel" style="margin-top:8px;">удалить</button>

  <!-- GRID -->
  <div class="panel-section">
    <div class="panel-title">сетка</div>
    <div class="toggle-row"><div class="toggle on" id="grid-toggle"></div><span class="toggle-label">показать</span></div>
    <div class="toggle-row"><div class="toggle on" id="snap-toggle"></div><span class="toggle-label">прилипание</span></div>

  <!-- LAYERS -->
  <div class="panel-section" style="flex:1;overflow:hidden;display:flex;flex-direction:column;padding-bottom:0;">
    <div class="panel-title">слои (<span id="layer-count">0</span>)</div>
    <div id="layer-list"></div>
  </div>

  <!-- SAVE -->
  <div class="panel-section">
    <button class="act-btn primary" id="btn-save">сохранить map.json</button>
    <button class="act-btn" id="btn-load">загрузить с сервера</button>
    <button class="act-btn danger" id="btn-clear">очистить всё</button>
    <input type="file" id="import-file" accept=".json" style="display:none">
  </div>

</div>

<script>
/* ══════════════════════════════════════════════════
   DATA MODEL
══════════════════════════════════════════════════ */
const canvas = document.getElementById('main-canvas');
const ctx    = canvas.getContext('2d');
const wrap   = document.getElementById('canvas-wrap');
ctx.imageSmoothingEnabled = false;

let worldW = 1280, worldH = 720;
let camX = 0, camY = 0, zoom = 1;

// Scenes
let scenes       = [{ id:1, name:'сцена 1', spawnPoint:{x:640,y:360}, objects:[] }];
let activeSceneId = 1;
let nextSceneId  = 2;
let nextObjId    = 1;
let texCache     = {};  // objId -> Image

const getScene  = (id = activeSceneId) => scenes.find(s => s.id === id);
const getObjs   = ()  => getScene()?.objects ?? [];

// Selection & tools
let selectedId = null;
let tool       = 'select';

// Drawing state
let drawing = false, drawStart = null, drawCurrent = null;
let panning = false, panStart  = null, camAtPan = null;
let dragging = false, dragStart = null, objAtDrag = null;
let resizing = false, resizeHandle = null, resizeStart = null, objAtResize = null;

// Spawn preview (when spawn tool active)
let mouseWorld = null;

// Grid
let gridSize = 32, showGrid = true, snapGrid = true;

// Undo/redo
let history = [], future = [];

/* ══════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════ */
function resizeCanvas() {
  canvas.width  = wrap.clientWidth;
  canvas.height = wrap.clientHeight - 28;
  ctx.imageSmoothingEnabled = false;
  render();
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();
fitWorld();

function fitWorld() {
  zoom = Math.min((wrap.clientWidth-40)/worldW, (wrap.clientHeight-56)/worldH, 1);
  camX = wrap.clientWidth/2 - worldW*zoom/2;
  camY = (wrap.clientHeight-28)/2 - worldH*zoom/2;
  render();
}

/* ══════════════════════════════════════════════════
   HELPERS
══════════════════════════════════════════════════ */
function screenToWorld(sx, sy) { return { x:(sx-camX)/zoom, y:(sy-camY)/zoom }; }
function snap(v) { return snapGrid ? Math.round(v/gridSize)*gridSize : Math.round(v); }

function ensureTexture(obj) {
  if (obj.texture && !texCache[obj.id]) {
    const img = new Image();
    img.src = obj.texture;
    img.onload = () => render();
    texCache[obj.id] = img;
  }
}

function hexToRgba(hex, a) {
  hex = (hex||'#888').replace('#','');
  if (hex.length===3) hex=hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
  return `rgba(${parseInt(hex.slice(0,2),16)},${parseInt(hex.slice(2,4),16)},${parseInt(hex.slice(4,6),16)},${a??1})`;
}

/* ══════════════════════════════════════════════════
   RENDER
══════════════════════════════════════════════════ */
function render() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle='#0d0d0d';
  ctx.fillRect(camX,camY,worldW*zoom,worldH*zoom);

  // scanline hint
  if (zoom > 0.2) {
    ctx.fillStyle='rgba(255,255,255,0.012)';
    for (let y=0;y<worldH;y+=4) ctx.fillRect(camX,camY+y*zoom,worldW*zoom,1);
  }

  // grid
  if (showGrid && zoom>0.15) {
    ctx.strokeStyle='#191919'; ctx.lineWidth=0.5;
    for (let wx=0;wx<=worldW;wx+=gridSize) {
      const sx=camX+wx*zoom;
      ctx.beginPath(); ctx.moveTo(sx,camY); ctx.lineTo(sx,camY+worldH*zoom); ctx.stroke();
    }
    for (let wy=0;wy<=worldH;wy+=gridSize) {
      const sy=camY+wy*zoom;
      ctx.beginPath(); ctx.moveTo(camX,sy); ctx.lineTo(camX+worldW*zoom,sy); ctx.stroke();
    }
  }

  ctx.strokeStyle='#2a2a2a'; ctx.lineWidth=1;
  ctx.strokeRect(camX,camY,worldW*zoom,worldH*zoom);

  // objects sorted by z
  const sorted = [...getObjs()].sort((a,b)=>(a.z||0)-(b.z||0));
  for (const obj of sorted) drawObj(obj, obj.id===selectedId);

  // spawn point
  const scene = getScene();
  if (scene) drawSpawn(scene.spawnPoint, false);
  if (tool==='spawn' && mouseWorld) drawSpawn({x:snap(mouseWorld.x), y:snap(mouseWorld.y)}, true);

  // draw preview
  if (drawing && drawStart && drawCurrent) {
    const rx=Math.min(drawStart.x,drawCurrent.x), ry=Math.min(drawStart.y,drawCurrent.y);
    const rw=Math.abs(drawCurrent.x-drawStart.x), rh=Math.abs(drawCurrent.y-drawStart.y);
    const sx=camX+rx*zoom, sy=camY+ry*zoom, sw=rw*zoom, sh=rh*zoom;
    const col = tool==='collider' ? '#ff3333' : tool==='portal' ? '#aa44ff' : '#33aaff';
    ctx.fillStyle=col+'22'; ctx.fillRect(sx,sy,sw,sh);
    ctx.strokeStyle=col; ctx.lineWidth=1;
    ctx.setLineDash(tool!=='object'?[4,3]:[]);
    ctx.strokeRect(sx,sy,sw,sh); ctx.setLineDash([]);
    if (sw>30&&sh>14) {
      ctx.fillStyle=col; ctx.font=`${Math.max(9,10*zoom)}px monospace`;
      ctx.fillText(`${Math.round(rw)}×${Math.round(rh)}`,sx+4,sy+12);
    }
  }

  document.getElementById('zoom-display').textContent = Math.round(zoom*100)+'%';
}

/* ── DRAW SINGLE OBJECT ── */
function drawObj(obj, selected) {
  const sx=camX+obj.x*zoom, sy=camY+obj.y*zoom;
  const sw=obj.w*zoom, sh=obj.h*zoom;

  const defaultAlpha = obj.type==='collider'?0.3 : obj.type==='portal'?0.2 : 0.7;
  const alpha = obj.opacity ?? defaultAlpha;
  const defaultColor = obj.type==='collider'?'#ff3333' : obj.type==='portal'?'#aa44ff' : '#33aaff';
  const col = obj.color || defaultColor;

  ctx.save();

  if (obj.type === 'object') {
    const img = texCache[obj.id];
    if (img && img.complete && img.naturalWidth>0) {
      ctx.globalAlpha=alpha; ctx.imageSmoothingEnabled=false;
      ctx.drawImage(img,sx,sy,sw,sh); ctx.globalAlpha=1;
    } else {
      ctx.fillStyle=hexToRgba(col,alpha); ctx.fillRect(sx,sy,sw,sh);
      if (zoom>0.3&&sw>20) {
        ctx.fillStyle='#fff'; ctx.font=`${Math.max(8,9*zoom)}px monospace`;
        ctx.globalAlpha=0.45; ctx.fillText(obj.name||'object',sx+3,sy+11); ctx.globalAlpha=1;
      }
    }
    ctx.strokeStyle=selected?'#c8ff00':col; ctx.lineWidth=selected?1.5:0.8;
    ctx.strokeRect(sx+.5,sy+.5,sw-1,sh-1);

  } else if (obj.type === 'collider') {
    ctx.fillStyle=hexToRgba(col,alpha); ctx.fillRect(sx,sy,sw,sh);
    ctx.strokeStyle=col; ctx.lineWidth=selected?1.5:1;
    ctx.setLineDash([4,3]); ctx.strokeRect(sx+.5,sy+.5,sw-1,sh-1); ctx.setLineDash([]);
    if (zoom>0.3&&sw>20) {
      ctx.fillStyle=col; ctx.font=`${Math.max(8,9*zoom)}px monospace`;
      ctx.globalAlpha=0.7; ctx.fillText(obj.name||'collider',sx+3,sy+11); ctx.globalAlpha=1;
    }

  } else if (obj.type === 'portal') {
    // always show in editor with at least 0.18 alpha
    const dispAlpha = Math.max(alpha, 0.18);
    ctx.fillStyle=hexToRgba(col,dispAlpha); ctx.fillRect(sx,sy,sw,sh);
    ctx.strokeStyle=col; ctx.lineWidth=selected?1.5:1;
    ctx.setLineDash([3,3]); ctx.strokeRect(sx+.5,sy+.5,sw-1,sh-1); ctx.setLineDash([]);

    // arrow in center
    const cx=sx+sw/2, cy=sy+sh/2;
    const ar=Math.min(sw,sh)*0.22;
    ctx.strokeStyle=col; ctx.lineWidth=1.2;
    ctx.beginPath(); ctx.moveTo(cx-ar,cy); ctx.lineTo(cx+ar,cy); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx+ar*.45,cy-ar*.45); ctx.lineTo(cx+ar,cy); ctx.lineTo(cx+ar*.45,cy+ar*.45); ctx.stroke();

    // target label
    if (zoom>0.25&&sw>24) {
      const target = scenes.find(s=>s.id===obj.targetSceneId);
      const lbl    = target ? `→ ${target.name}` : '→ ?';
      ctx.fillStyle=col; ctx.font=`${Math.max(8,9*zoom)}px monospace`;
      ctx.globalAlpha=0.9; ctx.fillText(lbl,sx+3,sy+11); ctx.globalAlpha=1;
    }
  }

  if (selected) {
    ctx.strokeStyle='#c8ff00'; ctx.lineWidth=1;
    ctx.strokeRect(sx-1,sy-1,sw+2,sh+2);
    for (const h of getHandles(obj)) {
      const hsx=camX+h.wx*zoom, hsy=camY+h.wy*zoom;
      ctx.fillStyle='#c8ff00'; ctx.fillRect(hsx-4,hsy-4,8,8);
      ctx.strokeStyle='#000'; ctx.lineWidth=0.5; ctx.strokeRect(hsx-4,hsy-4,8,8);
    }
  }
  ctx.restore();
}

/* ── DRAW SPAWN MARKER ── */
function drawSpawn(sp, preview) {
  if (!sp) return;
  const sx=camX+sp.x*zoom, sy=camY+sp.y*zoom;
  const size=Math.max(7,11*zoom);
  ctx.save();
  ctx.strokeStyle='#00ff88'; ctx.lineWidth=1.2;
  ctx.fillStyle=preview?'rgba(0,255,136,0.08)':'rgba(0,255,136,0.15)';
  ctx.globalAlpha=preview?0.55:1;
  // diamond
  ctx.beginPath();
  ctx.moveTo(sx,sy-size); ctx.lineTo(sx+size,sy); ctx.lineTo(sx,sy+size); ctx.lineTo(sx-size,sy);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  // crosshair
  ctx.beginPath();
  ctx.moveTo(sx-size*.45,sy); ctx.lineTo(sx+size*.45,sy);
  ctx.moveTo(sx,sy-size*.45); ctx.lineTo(sx,sy+size*.45);
  ctx.stroke();
  if (zoom>0.35) {
    ctx.fillStyle='#00ff88'; ctx.font=`${Math.max(8,9*zoom)}px monospace`;
    ctx.globalAlpha=preview?0.4:0.8; ctx.fillText('spawn',sx+size+3,sy+4);
  }
  ctx.restore();
}

/* ── HANDLES ── */
function getHandles(obj) {
  const cx=obj.x+obj.w/2, cy=obj.y+obj.h/2;
  return [
    {id:'nw',wx:obj.x,       wy:obj.y       }, {id:'n', wx:cx,          wy:obj.y       },
    {id:'ne',wx:obj.x+obj.w, wy:obj.y       }, {id:'e', wx:obj.x+obj.w, wy:cy          },
    {id:'se',wx:obj.x+obj.w, wy:obj.y+obj.h }, {id:'s', wx:cx,          wy:obj.y+obj.h },
    {id:'sw',wx:obj.x,       wy:obj.y+obj.h }, {id:'w', wx:obj.x,       wy:cy          },
  ];
}

/* ══════════════════════════════════════════════════
   HIT TEST
══════════════════════════════════════════════════ */
function hitHandle(wx,wy) {
  const sel=getObjs().find(o=>o.id===selectedId); if(!sel) return null;
  const t=8/zoom;
  for (const h of getHandles(sel)) if(Math.abs(wx-h.wx)<t&&Math.abs(wy-h.wy)<t) return h.id;
  return null;
}
function hitObj(wx,wy) {
  const s=[...getObjs()].sort((a,b)=>(b.z||0)-(a.z||0));
  for (const o of s) if(wx>=o.x&&wx<=o.x+o.w&&wy>=o.y&&wy<=o.y+o.h) return o.id;
  return null;
}

/* ══════════════════════════════════════════════════
   MOUSE
══════════════════════════════════════════════════ */
canvas.addEventListener('mousedown', e => {
  const wp=screenToWorld(e.offsetX,e.offsetY);

  if (e.button===1||(e.button===0&&tool==='move')) {
    panning=true; panStart={x:e.clientX,y:e.clientY}; camAtPan={x:camX,y:camY};
    canvas.style.cursor='grabbing'; return;
  }
  if (e.button!==0) return;

  // SPAWN TOOL — click to place
  if (tool==='spawn') {
    saveHistory();
    getScene().spawnPoint = { x:snap(wp.x), y:snap(wp.y) };
    render(); return;
  }

  if (tool==='select') {
    const handle=hitHandle(wp.x,wp.y);
    if (handle) {
      saveHistory(); resizing=true; resizeHandle=handle;
      resizeStart={wx:wp.x,wy:wp.y};
      objAtResize={...getObjs().find(o=>o.id===selectedId)}; return;
    }
    const hit=hitObj(wp.x,wp.y);
    if (hit!==null) {
      selectedId=hit; saveHistory();
      dragging=true; dragStart={wx:wp.x,wy:wp.y};
      objAtDrag={...getObjs().find(o=>o.id===hit)};
    } else { selectedId=null; }
    updateProps(); updateLayers(); render(); return;
  }

  if (['collider','portal','object'].includes(tool)) {
    drawing=true;
    drawStart={x:snap(wp.x),y:snap(wp.y)};
    drawCurrent={...drawStart};
  }
});

canvas.addEventListener('mousemove', e => {
  const wp=screenToWorld(e.offsetX,e.offsetY);
  mouseWorld=wp;
  document.getElementById('pos-display').textContent=`x:${Math.round(wp.x)} y:${Math.round(wp.y)}`;

  if (tool==='select') {
    const h=hitHandle(wp.x,wp.y);
    const cr={nw:'nw-resize',n:'n-resize',ne:'ne-resize',e:'e-resize',se:'se-resize',s:'s-resize',sw:'sw-resize',w:'w-resize'};
    canvas.style.cursor=h?(cr[h]||'crosshair'):'default';
  }

  if (panning) { camX=camAtPan.x+(e.clientX-panStart.x); camY=camAtPan.y+(e.clientY-panStart.y); render(); return; }

  if (resizing) {
    const obj=getObjs().find(o=>o.id===selectedId); if(!obj) return;
    const dx=snap(wp.x)-snap(resizeStart.wx), dy=snap(wp.y)-snap(resizeStart.wy);
    const o=objAtResize;
    let nx=o.x,ny=o.y,nw=o.w,nh=o.h;
    if(resizeHandle.includes('w')){nx=snap(o.x+dx);nw=Math.max(4,o.w-dx);}
    if(resizeHandle.includes('e')){nw=Math.max(4,o.w+dx);}
    if(resizeHandle.includes('n')){ny=snap(o.y+dy);nh=Math.max(4,o.h-dy);}
    if(resizeHandle.includes('s')){nh=Math.max(4,o.h+dy);}
    obj.x=nx;obj.y=ny;obj.w=nw;obj.h=nh; updateProps(); render(); return;
  }

  if (dragging) {
    const obj=getObjs().find(o=>o.id===selectedId); if(!obj) return;
    const dx=snap(wp.x)-snap(dragStart.wx), dy=snap(wp.y)-snap(dragStart.wy);
    obj.x=snap(objAtDrag.x+dx); obj.y=snap(objAtDrag.y+dy);
    updateProps(); render(); return;
  }

  if (drawing) { drawCurrent={x:snap(wp.x),y:snap(wp.y)}; }
  render();
});

canvas.addEventListener('mouseup', () => {
  if (panning) { panning=false; canvas.style.cursor=tool==='select'?'default':'crosshair'; return; }
  resizing=false; dragging=false;

  if (drawing&&drawStart&&drawCurrent) {
    const rx=Math.min(drawStart.x,drawCurrent.x), ry=Math.min(drawStart.y,drawCurrent.y);
    const rw=Math.abs(drawCurrent.x-drawStart.x), rh=Math.abs(drawCurrent.y-drawStart.y);
    if (rw>=4&&rh>=4) {
      saveHistory();
      const defaults = {
        collider: {color:'#ff3333', opacity:0.3,  z:10},
        portal:   {color:'#aa44ff', opacity:0,    z:5 },
        object:   {color:'#33aaff', opacity:0.7,  z:0 },
      };
      const d = defaults[tool]||defaults.object;
      const obj = {
        id:nextObjId++, type:tool,
        name:`${tool}_${nextObjId-1}`,
        x:rx,y:ry,w:rw,h:rh,
        color:d.color, opacity:d.opacity, z:d.z,
        texture:null,
        ...(tool==='portal'?{targetSceneId:null}:{})
      };
      getObjs().push(obj);
      selectedId=obj.id; updateProps(); updateLayers();
    }
    drawing=false; drawStart=null; drawCurrent=null; render();
  }
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const f=e.deltaY<0?1.1:0.9;
  const wx=(e.offsetX-camX)/zoom, wy=(e.offsetY-camY)/zoom;
  zoom=Math.max(0.05,Math.min(8,zoom*f));
  camX=e.offsetX-wx*zoom; camY=e.offsetY-wy*zoom; render();
},{passive:false});

/* ══════════════════════════════════════════════════
   KEYBOARD
══════════════════════════════════════════════════ */
window.addEventListener('keydown', e => {
  if(e.target.tagName==='INPUT'||e.target.tagName==='SELECT') return;
  const k=e.key;
  if(k==='v'||k==='V') setTool('select');
  if(k==='c'||k==='C') setTool('collider');
  if(k==='p'||k==='P') setTool('portal');
  if(k==='o'||k==='O') setTool('object');
  if(k==='s'||k==='S') setTool('spawn');
  if(k==='h'||k==='H') setTool('move');
  if(k==='f'||k==='F') fitWorld();
  if(k==='+'||k==='='){zoom=Math.min(8,zoom*1.2);render();}
  if(k==='-'){zoom=Math.max(0.05,zoom/1.2);render();}
  if((k==='Delete'||k==='Backspace')&&selectedId!==null) deleteSel();
  if(e.ctrlKey&&k==='z'){e.preventDefault();undo();}
  if(e.ctrlKey&&(k==='y'||k==='Z')){e.preventDefault();redo();}
  if(e.ctrlKey&&k==='s'){e.preventDefault();saveToFile();}

  const sel=getObjs().find(o=>o.id===selectedId);
  if(sel){
    const step=e.shiftKey?gridSize:1; let moved=false;
    if(k==='ArrowLeft'){saveHistory();sel.x-=step;moved=true;}
    if(k==='ArrowRight'){saveHistory();sel.x+=step;moved=true;}
    if(k==='ArrowUp'){saveHistory();sel.y-=step;moved=true;}
    if(k==='ArrowDown'){saveHistory();sel.y+=step;moved=true;}
    if(moved){updateProps();render();e.preventDefault();}
  }
});

let spaceDown=false;
window.addEventListener('keydown',e=>{if(e.code==='Space'&&e.target.tagName!=='INPUT'){e.preventDefault();if(!spaceDown){spaceDown=true;canvas.style.cursor='grab';}}});
window.addEventListener('keyup',e=>{if(e.code==='Space'){spaceDown=false;canvas.style.cursor=tool==='select'?'default':'crosshair';}});
canvas.addEventListener('mousedown',e=>{if(spaceDown&&e.button===0){panning=true;panStart={x:e.clientX,y:e.clientY};camAtPan={x:camX,y:camY};canvas.style.cursor='grabbing';}},true);

/* ══════════════════════════════════════════════════
   TOOLS
══════════════════════════════════════════════════ */
function setTool(t) {
  tool=t;
  document.querySelectorAll('.tool-btn').forEach(b=>b.classList.remove('active'));
  const map={select:'btn-select',collider:'btn-collider',portal:'btn-portal',object:'btn-object',spawn:'btn-spawn',move:'btn-move'};
  if(map[t]) document.getElementById(map[t]).classList.add('active');
  const c={select:'default',move:'grab',spawn:'cell'};
  canvas.style.cursor=c[t]||'crosshair';
  render();
}
['select','collider','portal','object','spawn','move'].forEach(t=>
  document.getElementById('btn-'+t).addEventListener('click',()=>setTool(t))
);
document.getElementById('btn-zoom-in').addEventListener('click',()=>{zoom=Math.min(8,zoom*1.3);render();});
document.getElementById('btn-zoom-out').addEventListener('click',()=>{zoom=Math.max(0.05,zoom/1.3);render();});
document.getElementById('btn-zoom-fit').addEventListener('click',fitWorld);
document.getElementById('btn-undo').addEventListener('click',undo);
document.getElementById('btn-redo').addEventListener('click',redo);

/* ══════════════════════════════════════════════════
   UNDO / REDO
══════════════════════════════════════════════════ */
function snapshotScenes() {
  return scenes.map(s=>({
    ...s,
    objects: s.objects.map(o=>({...o, texture:o.texture?'__tex__':null}))
  }));
}
function saveHistory() {
  history.push(JSON.stringify(snapshotScenes()));
  future=[]; if(history.length>60) history.shift();
}
function restoreScenes(snap) {
  scenes=snap.map(s=>({
    ...s,
    objects:s.objects.map(o=>{
      const live=scenes.find(sc=>sc.id===s.id)?.objects.find(lo=>lo.id===o.id);
      return{...o, texture:o.texture==='__tex__'?(live?.texture||null):null};
    })
  }));
  for(const s of scenes) for(const o of s.objects) ensureTexture(o);
}
function undo(){if(!history.length)return;future.push(JSON.stringify(snapshotScenes()));restoreScenes(JSON.parse(history.pop()));selectedId=null;updateProps();updateLayers();updateSceneList();render();}
function redo(){if(!future.length)return;history.push(JSON.stringify(snapshotScenes()));restoreScenes(JSON.parse(future.pop()));selectedId=null;updateProps();updateLayers();updateSceneList();render();}

/* ══════════════════════════════════════════════════
   SCENE MANAGER
══════════════════════════════════════════════════ */
function updateSceneList() {
  const list=document.getElementById('scene-list');
  list.innerHTML='';
  for (const sc of scenes) {
    const div=document.createElement('div');
    div.className='scene-item'+(sc.id===activeSceneId?' active':'');
    div.innerHTML=`
      <div class="scene-dot"></div>
      <span class="scene-name">${sc.name}</span>
      <button class="scene-btn" data-action="rename" title="переименовать">✏</button>
      <button class="scene-btn del" data-action="delete" title="удалить">✕</button>
    `;
    div.addEventListener('click', ev => {
      const action = ev.target.closest('[data-action]')?.dataset.action;
      if (action==='rename') {
        const name=prompt('Название сцены:',sc.name); if(!name) return;
        saveHistory(); sc.name=name; updateSceneList(); render(); return;
      }
      if (action==='delete') {
        if (scenes.length<=1){alert('Нельзя удалить единственную сцену.');return;}
        if (!confirm(`Удалить «${sc.name}»?`)) return;
        saveHistory();
        // remove portal refs to this scene
        for (const s of scenes) for (const o of s.objects) if(o.type==='portal'&&o.targetSceneId===sc.id) o.targetSceneId=null;
        scenes=scenes.filter(s=>s.id!==sc.id);
        if (activeSceneId===sc.id) { activeSceneId=scenes[0].id; selectedId=null; }
        updateSceneList(); updateLayers(); updateProps(); render(); return;
      }
      // click on row = switch scene
      if (!ev.target.closest('[data-action]')) {
        activeSceneId=sc.id; selectedId=null;
        updateSceneList(); updateLayers(); updateProps(); render();
      }
    });
    list.appendChild(div);
  }
}

document.getElementById('btn-add-scene').addEventListener('click',()=>{
  const name=prompt('Название новой сцены:',`сцена ${nextSceneId}`);
  if(!name) return;
  saveHistory();
  scenes.push({id:nextSceneId, name, spawnPoint:{x:640,y:360}, objects:[]});
  activeSceneId=nextSceneId++;
  selectedId=null;
  updateSceneList(); updateLayers(); updateProps(); fitWorld();
});

/* ══════════════════════════════════════════════════
   PROPERTIES PANEL
══════════════════════════════════════════════════ */
function updateProps() {
  const form  =document.getElementById('props-form');
  const empty =document.getElementById('props-empty');
  const texSec=document.getElementById('tex-section');
  const porSec=document.getElementById('portal-section');
  const sel   =getObjs().find(o=>o.id===selectedId);

  if(!sel){form.style.display='none';empty.style.display='block';return;}
  form.style.display='block'; empty.style.display='none';

  document.getElementById('p-name').value   =sel.name||'';
  document.getElementById('p-x').value      =Math.round(sel.x);
  document.getElementById('p-y').value      =Math.round(sel.y);
  document.getElementById('p-w').value      =Math.round(sel.w);
  document.getElementById('p-h').value      =Math.round(sel.h);
  document.getElementById('p-color').value  =sel.color||'#33aaff';
  document.getElementById('p-opacity').value=sel.opacity??0.7;
  document.getElementById('p-z').value      =sel.z||0;

  texSec.style.display = sel.type==='object'  ? 'block':'none';
  porSec.style.display = sel.type==='portal' ? 'block':'none';
  refreshTexPreview(sel);

  if (sel.type==='portal') {
    const sel2=document.getElementById('p-target-scene');
    sel2.innerHTML='<option value="">— не выбрано —</option>';
    for(const sc of scenes){
      if(sc.id===activeSceneId) continue;
      const opt=document.createElement('option');
      opt.value=sc.id; opt.textContent=sc.name;
      if(sc.id===sel.targetSceneId) opt.selected=true;
      sel2.appendChild(opt);
    }
  }
}

document.getElementById('p-target-scene').addEventListener('change',function(){
  const sel=getObjs().find(o=>o.id===selectedId); if(!sel) return;
  sel.targetSceneId=this.value?parseInt(this.value):null;
  render();
});

function refreshTexPreview(sel) {
  const prev=document.getElementById('tex-preview');
  const none=document.getElementById('tex-none-label');
  const rm  =document.getElementById('tex-remove');
  if(sel&&sel.texture){
    prev.src=sel.texture; prev.style.display='block';
    none.style.display='none'; rm.style.display='block';
  } else {
    prev.style.display='none'; none.style.display='block'; rm.style.display='none';
  }
}

function bindProp(id,field,parser){
  document.getElementById(id).addEventListener('input',function(){
    const sel=getObjs().find(o=>o.id===selectedId); if(!sel) return;
    sel[field]=parser?parser(this.value):this.value;
    updateLayers(); render();
  });
}
bindProp('p-name','name');
bindProp('p-x','x',parseFloat);
bindProp('p-y','y',parseFloat);
bindProp('p-w','w',v=>Math.max(1,parseFloat(v)));
bindProp('p-h','h',v=>Math.max(1,parseFloat(v)));
bindProp('p-color','color');
bindProp('p-opacity','opacity',parseFloat);
bindProp('p-z','z',parseInt);

document.getElementById('btn-delete-sel').addEventListener('click',deleteSel);
function deleteSel(){
  if(selectedId===null) return;
  saveHistory(); delete texCache[selectedId];
  getScene().objects=getObjs().filter(o=>o.id!==selectedId);
  selectedId=null; updateProps(); updateLayers(); render();
}

/* ── TEXTURE ── */
document.getElementById('btn-tex-upload').addEventListener('click',()=>document.getElementById('tex-file').click());
document.getElementById('tex-file').addEventListener('change',function(){
  const file=this.files[0]; if(!file) return;
  const sel=getObjs().find(o=>o.id===selectedId); if(!sel) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    sel.texture=ev.target.result;
    const img=new Image(); img.src=sel.texture; img.onload=()=>render();
    texCache[sel.id]=img; refreshTexPreview(sel); render();
  };
  reader.readAsDataURL(file); this.value='';
});
document.getElementById('tex-remove').addEventListener('click',()=>{
  const sel=getObjs().find(o=>o.id===selectedId); if(!sel) return;
  sel.texture=null; delete texCache[sel.id]; refreshTexPreview(sel); render();
});

/* ══════════════════════════════════════════════════
   LAYER LIST
══════════════════════════════════════════════════ */
function updateLayers(){
  const list=document.getElementById('layer-list');
  document.getElementById('layer-count').textContent=getObjs().length;
  document.getElementById('count-display').textContent=`${getObjs().length} объект${getObjs().length===1?'':'ов'}`;
  list.innerHTML='';
  const sorted=[...getObjs()].sort((a,b)=>(b.z||0)-(a.z||0));
  for(const obj of sorted){
    const div=document.createElement('div');
    div.className='layer-item'+(obj.id===selectedId?' selected':'');
    const colDot=obj.type==='collider'?'#ff3333':obj.type==='portal'?'#aa44ff':(obj.color||'#33aaff');
    div.innerHTML=`
      <div class="layer-dot" style="background:${colDot}"></div>
      <span class="type-tag ${obj.type}">${obj.type==='collider'?'col':obj.type==='portal'?'prt':'obj'}</span>
      <span class="layer-name">${obj.texture?'▣ ':''}${obj.name||obj.type}</span>
      <button class="layer-del">✕</button>
    `;
    div.addEventListener('click',ev=>{
      if(ev.target.classList.contains('layer-del'))return;
      selectedId=obj.id; updateProps(); updateLayers(); render();
    });
    div.querySelector('.layer-del').addEventListener('click',()=>{
      saveHistory(); delete texCache[obj.id];
      getScene().objects=getObjs().filter(o=>o.id!==obj.id);
      if(selectedId===obj.id){selectedId=null;updateProps();}
      updateLayers(); render();
    });
    list.appendChild(div);
  }
}

/* ══════════════════════════════════════════════════
   GRID
══════════════════════════════════════════════════ */
document.getElementById('grid-toggle').addEventListener('click',function(){showGrid=!showGrid;this.classList.toggle('on',showGrid);render();});
document.getElementById('snap-toggle').addEventListener('click',function(){snapGrid=!snapGrid;this.classList.toggle('on',snapGrid);});
document.getElementById('grid-size').addEventListener('input',function(){gridSize=Math.max(4,parseInt(this.value)||32);render();});

/* ══════════════════════════════════════════════════
   SAVE / LOAD
══════════════════════════════════════════════════ */
function buildMapData(){
  return {
    version:2,
    world:{w:worldW,h:worldH},
    scenes: scenes.map(s=>({
      id:s.id, name:s.name,
      spawnPoint:{x:Math.round(s.spawnPoint.x),y:Math.round(s.spawnPoint.y)},
      objects:s.objects.map(o=>({
        id:o.id,type:o.type,name:o.name,
        x:Math.round(o.x),y:Math.round(o.y),w:Math.round(o.w),h:Math.round(o.h),
        color:o.color,opacity:o.opacity,z:o.z||0,
        texture:o.texture||null,
        ...(o.type==='portal'?{targetSceneId:o.targetSceneId||null}:{})
      }))
    }))
  };
}

function saveToFile(){
  const blob=new Blob([JSON.stringify(buildMapData(),null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='map.json'; a.click();
  const f=document.getElementById('save-flash'); f.style.opacity='1'; setTimeout(()=>f.style.opacity='0',1600);
}

function importMapData(data){
  texCache={};
  if (data.version===2&&Array.isArray(data.scenes)) {
    scenes=data.scenes.map(s=>({...s,objects:(s.objects||[]).map(o=>({...o}))}));
    nextSceneId=Math.max(0,...scenes.map(s=>s.id||0))+1;
  } else {
    // v1 compat
    scenes=[{id:1,name:'сцена 1',spawnPoint:{x:640,y:360},objects:(data.objects||[]).map(o=>({...o}))}];
    nextSceneId=2;
  }
  if(data.world){worldW=data.world.w;worldH=data.world.h;}
  activeSceneId=scenes[0]?.id||1;
  nextObjId=Math.max(0,...scenes.flatMap(s=>s.objects.map(o=>o.id||0)))+1;
  for(const s of scenes) for(const o of s.objects) ensureTexture(o);
  selectedId=null; updateProps(); updateLayers(); updateSceneList(); fitWorld();
}

async function loadFromServer(){
  try{
    const res=await fetch('map.json?_='+Date.now());
    if(!res.ok) throw new Error('HTTP '+res.status);
    importMapData(await res.json());
  }catch(e){alert('Не удалось загрузить map.json: '+e.message);}
}

document.getElementById('btn-save').addEventListener('click',saveToFile);
document.getElementById('btn-load').addEventListener('click',()=>{
  if(!getObjs().length||confirm('Загрузить с сервера?')) loadFromServer();
});
document.getElementById('btn-clear').addEventListener('click',()=>{
  if(!confirm('Очистить всё?'))return;
  saveHistory(); texCache={};
  scenes=[{id:1,name:'сцена 1',spawnPoint:{x:640,y:360},objects:[]}];
  activeSceneId=1; nextSceneId=2; selectedId=null;
  updateProps(); updateLayers(); updateSceneList(); render();
});

/* ══════════════════════════════════════════════════
   STARTUP
══════════════════════════════════════════════════ */
(async()=>{
  try{
    const res=await fetch('map.json?_='+Date.now());
    if(res.ok){const d=await res.json();if(d.scenes?.length||d.objects?.length) importMapData(d);}
  }catch(e){}
})();

setTimeout(()=>{ document.getElementById('hint').style.opacity='0'; },5000);
updateSceneList(); updateLayers(); updateProps(); render();
</script>
</body>
</html>
